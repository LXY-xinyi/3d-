<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
<style>
*{margin:0;padding:0}
body{background:#fff;color:#333;font-family:SimSun,serif}
.box{max-width:1200px;margin:0 auto;padding:40px 20px}
model-viewer{width:100%;height:70vh;display:block;background:#fff;margin-bottom:30px}
h1{text-align:center;margin-bottom:16px;font-size:28px}
.desc{text-align:center;line-height:1.8;font-size:16px;color:#555;max-width:800px;margin:0 auto}
</style>
</head>
<body>
<div class="box">
<model-viewer src="./花季.glb" camera-controls auto-rotate background-color="#ffffff"></model-viewer>
<h1>素瓷冠花，静候花期</h1>
<p class="desc">哑光黑瓷人像托举满头素白瓷花，景德镇手工捏雕《花季》，瓣瓣手工塑造成型。黑白交织留住盛放年华，瓷土凝住永不衰败的温柔繁花。</p>
</div>
</body>
</html>
